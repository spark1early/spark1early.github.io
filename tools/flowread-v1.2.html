<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowRead v1.2 — spark1early.github.io</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Spark1Early v3 theme — hardcoded, matches site exactly */
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f0;
  --muted: rgba(240,240,240,0.4);
  --accent: #cc0000;
  --accent-hover: #ff2222;
  --gold: #cc0000;
  --pulse: rgba(204,0,0,0.12);
  --display-font: 'Bebas Neue', sans-serif;
  --body-font: 'Instrument Sans', sans-serif;
  --mono-font: 'DM Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body-font);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* HEADER */
header {
  width: 100%;
  padding: 1.4rem 3rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  gap: 1rem;
  flex-wrap: wrap;
  background: var(--bg);
}

.header-left { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; }

.logo {
  font-family: var(--display-font);
  font-size: 2rem;
  color: var(--accent);
  letter-spacing: 0.06em;
}

.tagline {
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-family: var(--mono-font);
}

.version-badge {
  font-size: 0.6rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 100px;
  color: var(--accent);
  font-family: var(--mono-font);
  letter-spacing: 0.1em;
}

.back-link {
  font-family: var(--mono-font);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.back-link:hover { color: var(--accent); }

/* SECTION NAV */
.section-nav {
  width: 100%;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: stretch;
  overflow-x: auto;
  scrollbar-width: none;
}
.section-nav::-webkit-scrollbar { display: none; }

.section-nav-label {
  font-family: var(--mono-font);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 16px 0 0;
  display: flex;
  align-items: center;
  border-right: 1px solid var(--border);
  margin-right: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}

.section-btn {
  background: none;
  border: none;
  border-right: 1px solid var(--border);
  padding: 12px 16px;
  font-family: var(--mono-font);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
  border-bottom: 2px solid transparent;
}

.section-btn:hover { color: var(--text); background: var(--surface2); }
.section-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--surface2); }

.sec-words {
  font-size: 0.5rem;
  color: var(--muted);
  opacity: 0.5;
}

/* MAIN */
.main {
  width: 100%;
  max-width: 860px;
  padding: 2rem 2rem;
  display: flex;
  flex-direction: column;
  gap: 1.8rem;
}

/* READER STAGE */
.reader-stage {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  height: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: border-color 0.3s;
}

.reader-stage.playing {
  border-color: rgba(204,0,0,0.3);
}

.reader-stage::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, var(--pulse) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.reader-stage.playing::before { opacity: 1; }

.focus-line {
  position: absolute;
  width: 2px;
  height: 50px;
  background: linear-gradient(to bottom, transparent, var(--accent), transparent);
  left: 50%;
  transform: translateX(-50%);
  opacity: 0.25;
}

.word-display {
  font-family: var(--display-font);
  font-size: 3rem;
  letter-spacing: 0.04em;
  color: var(--text);
  text-align: center;
  position: relative;
  z-index: 1;
  min-height: 4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 2rem;
  width: 100%;
}

.word-display .word-wrap {
  display: flex;
  align-items: baseline;
}

.word-display .before { text-align: right; flex: 1; min-width: 0; }
.word-display .after { text-align: left; flex: 1; min-width: 0; }

.word-display .orp {
  color: var(--accent);
  position: relative;
}

.word-display .orp::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  opacity: 0.6;
}

.progress-info {
  position: absolute;
  bottom: 1rem;
  display: flex;
  gap: 2rem;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  font-family: var(--mono-font);
}

.progress-bar-wrap {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--border);
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.1s linear;
}

/* MUSIC VIZ */
.music-viz {
  position: absolute;
  top: 1rem; right: 1.2rem;
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 20px;
}

.bar {
  width: 3px;
  background: var(--accent);
  border-radius: 2px;
  opacity: 0.4;
  height: 3px;
  transition: height 0.1s ease;
}

.music-label {
  position: absolute;
  top: 1rem; left: 1.2rem;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.14em;
  font-family: var(--mono-font);
  text-transform: uppercase;
}

.idle-text {
  font-size: 0.9rem;
  color: var(--muted);
  font-family: var(--body-font);
  letter-spacing: 0.05em;
}

/* CONTROLS */
.btn-row { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }

.btn {
  padding: 0.55rem 1.2rem;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-size: 0.75rem;
  cursor: pointer;
  font-family: var(--body-font);
  letter-spacing: 0.05em;
  transition: all 0.2s;
}

.btn:hover { border-color: var(--accent); color: var(--accent); }

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  font-weight: 600;
  padding: 0.6rem 1.8rem;
  font-family: var(--mono-font);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-size: 0.7rem;
}

.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }

/* SLIDERS */
.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}

.setting-block { display: flex; flex-direction: column; gap: 0.6rem; }

.slider-label {
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-family: var(--mono-font);
}

.slider-row { display: flex; align-items: center; gap: 1rem; }

input[type=range] {
  -webkit-appearance: none;
  flex: 1;
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
  box-shadow: 0 0 0 3px rgba(204,0,0,0.2);
}

.slider-val {
  font-size: 0.75rem;
  font-family: var(--mono-font);
  color: var(--accent);
  min-width: 56px;
  text-align: right;
}

/* GENRE PILLS */
.input-label {
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-family: var(--mono-font);
}

.genre-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

.genre-pill {
  padding: 0.3rem 0.8rem;
  border-radius: 100px;
  border: 1px solid var(--border);
  font-size: 0.7rem;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.2s;
  font-family: var(--body-font);
  background: transparent;
  letter-spacing: 0.04em;
}

.genre-pill:hover { border-color: var(--accent); color: var(--accent); }
.genre-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* DIVIDER */
.divider { height: 1px; background: var(--border); width: 100%; }

/* TEXTAREA */
.input-section { display: flex; flex-direction: column; gap: 0.6rem; }

textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--body-font);
  font-size: 0.85rem;
  padding: 0.9rem 1.1rem;
  resize: vertical;
  min-height: 90px;
  outline: none;
  line-height: 1.7;
  transition: border-color 0.2s;
}

textarea:focus { border-color: rgba(204,0,0,0.35); }
textarea::placeholder { color: var(--muted); }

@media (max-width: 600px) {
  header { padding: 1rem 1.2rem; }
  .section-nav { padding: 0 1rem; }
  .main { padding: 1.2rem 1rem; gap: 1.2rem; }
  .settings-grid { grid-template-columns: 1fr; }
  .word-display { font-size: 2.2rem !important; }
  .logo { font-size: 1.6rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">FLOWREAD</div>
    <div class="tagline">RSVP · Music-Synced · Accessible</div>
    <span class="version-badge">v1.2</span>
  </div>
  <a href="https://spark1early.github.io" class="back-link">← spark1early.github.io</a>
</header>

<!-- SECTION NAV — hardcoded from live site content -->
<div class="section-nav" id="sectionNav">
  <span class="section-nav-label">↓ LOAD SECTION</span>
</div>

<div class="main">

  <!-- READER STAGE -->
  <div class="reader-stage" id="stage">
    <div class="focus-line"></div>
    <div class="music-label" id="musicLabel">♩ NO MUSIC</div>
    <div class="music-viz">
      <div class="bar" id="b1"></div><div class="bar" id="b2"></div>
      <div class="bar" id="b3"></div><div class="bar" id="b4"></div>
      <div class="bar" id="b5"></div><div class="bar" id="b6"></div>
      <div class="bar" id="b7"></div>
    </div>
    <div class="word-display" id="wordDisplay">
      <span class="idle-text">Select a section above or paste text below</span>
    </div>
    <div class="progress-info">
      <span id="wordCount">0 / 0 words</span>
      <span id="wpmDisplay">— WPM</span>
      <span id="timeLeft">— remaining</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <!-- PLAYBACK -->
  <div class="btn-row">
    <button class="btn btn-primary" id="playBtn" onclick="togglePlay()">▶ PLAY</button>
    <button class="btn" onclick="restartReader()">↺ Restart</button>
    <button class="btn" onclick="skipBack()">« 10</button>
    <button class="btn" onclick="skipFwd()">10 »</button>
  </div>

  <div class="divider"></div>

  <!-- SETTINGS -->
  <div class="settings-grid">
    <div class="setting-block">
      <div class="slider-label">Reading Speed</div>
      <div class="slider-row">
        <input type="range" id="wpmSlider" min="60" max="800" value="250" step="10" oninput="updateWPM(this.value)">
        <div class="slider-val" id="wpmVal">250 WPM</div>
      </div>
    </div>
    <div class="setting-block">
      <div class="slider-label">Font Size</div>
      <div class="slider-row">
        <input type="range" id="fontSlider" min="1.5" max="5" value="3" step="0.25" oninput="updateFont(this.value)">
        <div class="slider-val" id="fontVal">3rem</div>
      </div>
    </div>
  </div>

  <!-- GENRE -->
  <div class="setting-block">
    <div class="input-label">Music Genre</div>
    <div class="genre-row">
      <button class="genre-pill active" id="pill-none" onclick="setGenre('none',this)">No Music</button>
      <button class="genre-pill" id="pill-jazz" onclick="setGenre('jazz',this)">Jazz</button>
      <button class="genre-pill" id="pill-classical" onclick="setGenre('classical',this)">Orchestral</button>
      <button class="genre-pill" id="pill-lofi" onclick="setGenre('lofi',this)">Lo-Fi</button>
      <button class="genre-pill" id="pill-drums" onclick="setGenre('drums',this)">Percussion</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- CUSTOM TEXT -->
  <div class="input-section">
    <div class="input-label">Or Paste Custom Text</div>
    <textarea id="textInput" placeholder="Paste any article, book excerpt, or text here..."></textarea>
    <button class="btn" style="align-self:flex-start" onclick="loadFromTextarea()">Load Text →</button>
  </div>

</div>

<script>
// ─── SITE CONTENT — hardcoded from spark1early.github.io live content ───────
const SITE_SECTIONS = [
  {
    label: 'INTRO',
    text: `Spark1Early. Boston, MA. Creator, Producer, Builder. Twenty years making music. Graphic design roots. Now building at the intersection of creativity and technology — independently, without permission. Also an AI consultant helping artists and businesses do the same. Twenty years producing. Five plus network placements. Three albums out.`
  },
  {
    label: 'CRAFT',
    text: `The Craft. Music Production. Producer. East Coast Hip-Hop, R&B, Trap Beats. Twenty years of building sounds from scratch. Sync placements on five major networks. Collaborations with artists who mean something. Visual Design. Designer. Visual Communications degree. Adobe Suite since before most people knew what it was. Album covers, brand identity, and visual storytelling — built with intention, not templates. Video and Film. Editor. Music videos, content, short-form. Cut with Descript and CapCut. AI-assisted for automatic cuts. Three YouTube channels. Always learning the next tool. Technology and AI. Builder. AI consultant. Automation architect. Building systems that do the work while you focus on what matters. No dev team, no agency — just imagination and the right tools.`
  },
  {
    label: 'MUSIC',
    text: `The Music. Independent since day one. Three albums. A catalog of collabs, beat tapes, and production work that spans two decades and several genres. No label. No team. Just the music. Sync placements through Jingle Punks. Collabs with Akrobatik, Kasia Lavon, Kyle Bent, and more. Production on ESPN, VICE, BET, MTV, and VH1. The catalog speaks for itself. All music available on Bandcamp. Stream, download, support independent art. Road of a Titan: Audible Imagery — Solo Album, 2025, Latest. Bright Winter — Solo Album. Son of a Drummer: Road of a Titan — Solo Album, 2023, Debut plus Deluxe Edition. Soul Purpose — Collab with Yak Tzu. Early Chapters — Collab with Arcaze, Yak Tzu, Ja Main. Still Got My Mask Vol. 1 and 2 — Beat Tape, Collab production with Lewis Tyler Music. The Ketchup Packet — Compilation, Boston, April 2026.`
  },
  {
    label: 'PROJECTS',
    text: `The Projects. Things built from imagination. Not for clients — for the culture. Details come on launch day. Project Static. Music culture. Technology. Something physical and digital at the same time. Trademark pending. More when it's ready. Project Signal. Built for independent artists and creators. The infrastructure you need without the gatekeepers you don't. Details on launch. FlowRead. RSVP reading tool with BPM-synced generative music. Now live at spark1early.github.io/tools/flowread.html. Open source roadmap in progress.`
  },
  {
    label: 'SERVICES',
    text: `The Services. Twenty years of creative work gave me a perspective most consultants don't have. I know what it costs to build something real. AI doesn't replace the creative process. It amplifies it. I help artists and small businesses use the right tools the right way. First conversation is free. Artist Track. AI tools for music promotion, content strategy, streaming optimization, and workflow. For independent artists ready to stop being invisible. Four hundred to eight hundred dollars per month. Business Track. AI workflow automation for the repetitive work keeping you from your actual business. Systems that run while you focus on growth. Six hundred to twelve hundred dollars per month. Product Build. You have an idea. I build it with AI. Concept to working prototype — no dev team, no agency. Fifteen hundred to five thousand dollars per project. Bundle. Both tracks at a loyalty rate. For the musician who runs a business or the business owner who also creates. Eight hundred to twelve hundred dollars per month.`
  },
  {
    label: 'ARTICLES',
    text: `The Articles. First Principles of Health: What's Actually Making You Sick. Chronic inflammation, toxic inputs, nutrient deficiency — the root causes behind most major diseases. Session notes from Health Results Monday with Heru Ofori Atta. How to Use AI Efficiently: Stop Burning Your Usage Limits. Tokens, context hygiene, model routing, OpenRouter free models, and the two-mode strategy. Get eight to ten times more from every AI session. AI Music vs. The Labels: What the Suno Fight Actually Means. Licensing talks stalled. Warner settled. Udio locked down. Here's what every human artist needs to understand about what's being decided right now. How I Organize AI Sessions to Stop Losing Context. A real folder system for running multiple projects with AI — built from actually doing it. One file per project, one paste per session, no recap needed. More coming. Music, technology, health, culture. Written from experience.`
  },
  {
    label: 'CONTACT',
    text: `Let's Talk. If you're an independent artist tired of being invisible, a small business ready to stop doing everything manually, or just want to connect — reach out. First conversation is free. Instagram at spark1early. X Twitter at spark1early. TikTok at spark1early. Threads at spark1early. Bandcamp at spark1early. LinkedIn Bakari Spear. HazeKazeX at YasukeHZ on X. Email bspear dot music at gmail dot com. Boston, MA. Human music. AI workflow.`
  }
];

// ─── BUILD SECTION NAV ───────────────────────────────────────────
const nav = document.getElementById('sectionNav');
SITE_SECTIONS.forEach(sec => {
  const wc = sec.text.split(/\s+/).length;
  const btn = document.createElement('button');
  btn.className = 'section-btn';
  btn.innerHTML = `${sec.label}<span class="sec-words">${wc} words</span>`;
  btn.onclick = () => loadSection(sec, btn);
  nav.appendChild(btn);
});

// ALL button
const allBtn = document.createElement('button');
const allText = SITE_SECTIONS.map(s => s.text).join(' ');
const allWC = allText.split(/\s+/).length;
allBtn.className = 'section-btn';
allBtn.innerHTML = `ALL<span class="sec-words">${allWC} words</span>`;
allBtn.onclick = () => loadSection({ label: 'ALL', text: allText }, allBtn);
nav.appendChild(allBtn);

// ─── STATE ───────────────────────────────────────────────────────
const AudioContext = window.AudioContext || window.webkitAudioContext;
let ctx = null, masterGain = null;
let words = [], wordIndex = 0, wpm = 250;
let isPlaying = false, timer = null;
let currentGenre = 'none', bpmInterval = null;

// ─── SECTION LOADER ──────────────────────────────────────────────
function loadSection(sec, btn) {
  document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (isPlaying) { isPlaying = false; clearTimeout(timer); stopMusic(); resetPlayBtn(); }
  words = sec.text.split(/\s+/).filter(w => w.length > 0);
  wordIndex = 0;
  updateCountDisplay();
  showWord(words[0]);
  document.getElementById('progressBar').style.width = '0%';
}

function loadFromTextarea() {
  const raw = document.getElementById('textInput').value.trim();
  if (!raw) return;
  document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
  if (isPlaying) { isPlaying = false; clearTimeout(timer); stopMusic(); resetPlayBtn(); }
  words = raw.split(/\s+/).filter(w => w.length > 0);
  wordIndex = 0;
  updateCountDisplay();
  showWord(words[0]);
  document.getElementById('progressBar').style.width = '0%';
}

// ─── READER ──────────────────────────────────────────────────────
function showWord(word) {
  if (!word) return;
  const i = word.length <= 1 ? 0 : word.length <= 5 ? 1 : word.length <= 9 ? 2 : 3;
  const before = word.slice(0, i);
  const orp = word.slice(i, i + 1);
  const after = word.slice(i + 1);
  document.getElementById('wordDisplay').innerHTML =
    `<div class="word-wrap"><span class="before">${before}</span><span class="orp">${orp}</span><span class="after">${after}</span></div>`;
}

function updateCountDisplay() {
  const total = words.length;
  const rem = total - wordIndex;
  const secs = Math.round((rem / wpm) * 60);
  document.getElementById('wordCount').textContent = `${wordIndex} / ${total} words`;
  document.getElementById('wpmDisplay').textContent = `${wpm} WPM`;
  document.getElementById('timeLeft').textContent = secs < 60 ? `${secs}s remaining` : `${Math.ceil(secs/60)}m remaining`;
  document.getElementById('progressBar').style.width = total > 0 ? ((wordIndex / total) * 100).toFixed(1) + '%' : '0%';
}

function getPauseMult(word) {
  const base = 60000 / wpm;
  if (/\.\.\.$/.test(word)) return base * 3.2;
  if (/[.!?]$/.test(word)) return base * 2.8;
  if (/[—:–]$/.test(word)) return base * 2.0;
  if (/;$/.test(word)) return base * 1.8;
  if (/[,)\]'"]$/.test(word)) return base * 1.4;
  if (/^[(\['""]/.test(word)) return base * 1.2;
  if (/-/.test(word)) return base * 0.9;
  if (word.length >= 10) return base * 1.15;
  return base;
}

function startReading() {
  clearTimeout(timer);
  function tick() {
    if (!isPlaying) return;
    if (wordIndex >= words.length) {
      isPlaying = false; stopMusic(); resetPlayBtn();
      document.getElementById('stage').classList.remove('playing');
      document.getElementById('wordDisplay').innerHTML = '<span class="idle-text">Done — restart to re-read</span>';
      return;
    }
    const word = words[wordIndex];
    showWord(word); wordIndex++;
    updateCountDisplay();
    timer = setTimeout(tick, getPauseMult(word));
  }
  tick();
}

function togglePlay() {
  if (!words.length) loadFromTextarea();
  if (!words.length) return;
  isPlaying = !isPlaying;
  const stage = document.getElementById('stage');
  if (isPlaying) {
    document.getElementById('playBtn').textContent = '⏸ PAUSE';
    stage.classList.add('playing');
    startReading(); startMusic(); animateViz();
    if (ctx) ctx.resume();
  } else {
    resetPlayBtn();
    stage.classList.remove('playing');
    clearTimeout(timer); stopMusic();
  }
}

function resetPlayBtn() { document.getElementById('playBtn').textContent = '▶ PLAY'; }

function restartReader() {
  clearTimeout(timer); stopMusic(); isPlaying = false; wordIndex = 0;
  resetPlayBtn();
  document.getElementById('stage').classList.remove('playing');
  if (words.length) { showWord(words[0]); updateCountDisplay(); }
  else document.getElementById('wordDisplay').innerHTML = '<span class="idle-text">Select a section above or paste text below</span>';
}

function skipBack() { wordIndex = Math.max(0, wordIndex - 10); if (words.length) showWord(words[wordIndex]); updateCountDisplay(); }
function skipFwd() { wordIndex = Math.min(words.length - 1, wordIndex + 10); if (words.length) showWord(words[wordIndex]); updateCountDisplay(); }

function updateWPM(val) {
  wpm = parseInt(val);
  document.getElementById('wpmVal').textContent = wpm + ' WPM';
  updateCountDisplay();
  if (isPlaying) { startReading(); restartMusic(); }
}

function updateFont(val) {
  document.getElementById('fontVal').textContent = parseFloat(val).toFixed(2) + 'rem';
  document.getElementById('wordDisplay').style.fontSize = val + 'rem';
}

// ─── AUDIO ENGINE ────────────────────────────────────────────────
function initAudio() {
  if (!ctx) {
    ctx = new AudioContext();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(ctx.destination);
  }
}

const SCALES = {
  jazz: [60,62,63,65,67,69,70,72,74,75],
  classical: [60,62,64,65,67,69,71,72,74,76],
  lofi: [60,63,65,67,70,72,75,77],
  drums: null
};

const GENRES = {
  none: '♩ NO MUSIC', jazz: '♪ JAZZ',
  classical: '♩ ORCHESTRAL', lofi: '♫ LO-FI', drums: '♬ PERCUSSION'
};

function midi(n) { return 440 * Math.pow(2, (n - 69) / 12); }

function playNote(freq, start, dur, type='sine', vol=0.15) {
  if (!ctx) return;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(vol, start + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, start + dur);
  o.connect(g); g.connect(masterGain);
  o.start(start); o.stop(start + dur + 0.05);
}

function playKick(t) {
  if (!ctx) return;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.1);
  g.gain.setValueAtTime(0.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t + 0.2);
}

function playNoise(t, vol, freq, dur) {
  if (!ctx) return;
  const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource(), g = ctx.createGain(), f = ctx.createBiquadFilter();
  f.type = 'highpass'; f.frequency.value = freq;
  src.buffer = buf;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.8);
  src.connect(f); f.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + dur);
}

function scheduleMusicBeat() {
  if (!ctx || currentGenre === 'none') return;
  const bpm = Math.max(60, Math.min(200, wpm * 0.38));
  const bd = 60 / bpm, now = ctx.currentTime, ah = 0.5;

  if (['drums','jazz','lofi'].includes(currentGenre)) {
    playKick(now + ah);
    playNoise(now + ah + bd * 0.5, 0.08, 8000, 0.05);
    playNoise(now + ah + bd, 0.3, 1000, 0.1);
    playNoise(now + ah + bd * 1.5, 0.05, 8000, 0.05);
  }

  if (currentGenre === 'jazz') {
    const s = SCALES.jazz;
    [s[0],s[3],s[5],s[7]].forEach((n,i) => playNote(midi(n-12), now+ah+i*bd*0.4, bd*0.35, 'triangle', 0.08));
    playNote(midi(s[Math.floor(Math.random()*s.length)]), now+ah+bd*0.5, bd*0.6, 'sine', 0.1);
  }

  if (currentGenre === 'classical') {
    const s = SCALES.classical;
    [s[0],s[2],s[4]].forEach((n,i) => playNote(midi(n-12), now+ah+i*0.03, bd*1.8, 'sine', 0.06));
    playNote(midi(s[Math.floor(Math.random()*s.length)]+12), now+ah+bd*0.5, bd*0.9, 'sine', 0.1);
    playNote(midi(s[0]-24), now+ah, bd*2, 'triangle', 0.12);
  }

  if (currentGenre === 'lofi') {
    const s = SCALES.lofi;
    playNote(midi(s[Math.floor(Math.random()*s.length)]-12), now+ah, bd*1.2, 'triangle', 0.07);
    playNote(midi(s[Math.floor(Math.random()*s.length)]), now+ah+bd*0.75, bd*0.5, 'sine', 0.06);
  }
}

function startMusic() {
  if (currentGenre === 'none') return;
  initAudio();
  const bpm = Math.max(60, Math.min(200, wpm * 0.38));
  scheduleMusicBeat();
  bpmInterval = setInterval(() => { if (isPlaying && currentGenre !== 'none') scheduleMusicBeat(); }, (60/bpm)*1000*2);
}

function stopMusic() { if (bpmInterval) { clearInterval(bpmInterval); bpmInterval = null; } }
function restartMusic() { stopMusic(); if (isPlaying && currentGenre !== 'none') startMusic(); }

function animateViz() {
  if (!isPlaying || currentGenre === 'none') {
    document.querySelectorAll('.bar').forEach(b => b.style.height = '3px'); return;
  }
  const bpm = Math.max(60, Math.min(200, wpm * 0.38));
  const beatMs = (60/bpm)*1000;
  const t = Date.now() % beatMs / beatMs;
  document.querySelectorAll('.bar').forEach((b,i) => {
    b.style.height = Math.round(3 + Math.abs(Math.sin(t*Math.PI*2 + i*0.8)) * 16) + 'px';
  });
  requestAnimationFrame(animateViz);
}

function setGenre(genre, el) {
  currentGenre = genre;
  document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('musicLabel').textContent = GENRES[genre];
  if (isPlaying) { stopMusic(); if (genre !== 'none') startMusic(); }
}

updateCountDisplay();
</script>
